<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Dart Master Call v2</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#050814">
  <style>
    :root{--bg:#050814;--panel:#0e1630;--gold:#ffc928;--blue:#168cff;--text:#f8fbff;--muted:#aeb8d6;--playing:#22c55e;--danger:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at 30% -10%,rgba(22,140,255,.5),transparent 36%),radial-gradient(circle at 90% 10%,rgba(255,201,40,.18),transparent 28%),linear-gradient(180deg,#050814,#060914 70%,#02030a);min-height:100vh}header{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(3,6,16,.82);position:sticky;top:0;z-index:5;backdrop-filter:blur(8px)}.brand{font-size:22px;font-weight:1000}.brand span{color:var(--gold)}main{max-width:1150px;margin:0 auto;padding:14px}button{border:0;border-radius:14px;padding:12px 14px;font-weight:900;font-size:15px;background:var(--gold);color:#08101f;margin:4px;cursor:pointer}button.secondary{background:#26365f;color:white;border:1px solid rgba(255,255,255,.14)}button.blue{background:var(--blue);color:white}button.ok{background:var(--playing);color:#04130a}button.danger{background:var(--danger);color:white}input,select{width:100%;background:#081027;color:white;border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:12px;font-size:16px}label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px}.card{background:rgba(14,22,48,.9);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:14px;margin-bottom:12px;box-shadow:0 14px 32px rgba(0,0,0,.25)}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.grid{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:860px){.grid{grid-template-columns:repeat(2,1fr)}}.boardsAdmin{display:grid;grid-template-columns:1fr;gap:12px}@media(min-width:760px){.boardsAdmin{grid-template-columns:repeat(2,1fr)}}.boardAdmin{background:#091027;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px}.boardTitle{font-size:20px;font-weight:1000;display:flex;justify-content:space-between;align-items:center}.pill{display:inline-block;border-radius:999px;padding:5px 10px;font-weight:1000;font-size:12px}.free{background:rgba(238,243,255,.14);color:#fff;border:1px solid rgba(238,243,255,.35)}.called{background:rgba(255,201,40,.22);color:#ffe58b;border:1px solid rgba(255,201,40,.55)}.playing{background:rgba(34,197,94,.18);color:#a7f3c0;border:1px solid rgba(34,197,94,.5)}.small{color:var(--muted);font-size:13px}.hidden{display:none!important}#display{min-height:100vh;padding:18px}.displayHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;border-bottom:2px solid rgba(255,201,40,.35);padding-bottom:14px}.displayLogo{font-size:clamp(28px,4vw,54px);font-weight:1000}.displayLogo span{color:var(--gold)}.stats{font-size:clamp(14px,2vw,25px);color:var(--muted);text-align:right}.boardGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}@media(min-width:900px){.boardGrid{grid-template-columns:repeat(3,1fr)}}.boardTile{min-height:190px;border-radius:24px;padding:18px;border:3px solid rgba(255,255,255,.14);background:rgba(8,16,39,.92);display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 16px 32px rgba(0,0,0,.28)}.freeState{border-color:rgba(238,243,255,.35)}.calledState{border-color:rgba(255,201,40,.85);box-shadow:0 0 32px rgba(255,201,40,.22)}.playingState{border-color:rgba(34,197,94,.75);box-shadow:0 0 32px rgba(34,197,94,.18)}.tileTop{display:flex;justify-content:space-between;align-items:center;font-size:clamp(18px,2vw,28px);font-weight:1000}.tilePlayers{text-align:center;font-size:clamp(24px,3vw,46px);font-weight:1000;line-height:1.05;text-transform:uppercase}.tileStatus{text-align:center;font-size:clamp(18px,2vw,30px);font-weight:1000}.overlay{position:fixed;inset:0;background:radial-gradient(circle at 50% 10%,rgba(255,201,40,.28),transparent 30%),linear-gradient(180deg,#07122d,#02040b);display:flex;align-items:center;justify-content:center;text-align:center;padding:26px;z-index:20}.callBox{width:min(1050px,100%);border:5px solid var(--gold);border-radius:34px;padding:28px;background:rgba(4,8,20,.92);animation:flash .8s infinite}@keyframes flash{0%,100%{box-shadow:0 0 45px rgba(255,201,40,.45)}50%{box-shadow:0 0 120px rgba(255,201,40,1);transform:scale(1.015)}}.callTitle{font-size:clamp(44px,7vw,110px);font-weight:1000;color:var(--gold)}.callPlayers{font-size:clamp(40px,8vw,118px);font-weight:1000;line-height:1.02;text-transform:uppercase;margin:18px 0}.callPedana{font-size:clamp(28px,5vw,72px);font-weight:1000}
  </style>
</head>
<body>
<header id="topbar"><div class="brand">🎯 Dart <span>Master</span> Call v2</div><div class="row"><button class="secondary" onclick="showAdmin()">Telefono</button><button class="secondary" onclick="showDisplay()">Tablet/TV</button></div></header>
<main id="admin">
  <div class="card"><b>Collegamento torneo</b><div class="small">Telefono e tablet devono usare lo stesso codice torneo.</div><label>Codice torneo</label><input id="room" value="BARMAGIC" oninput="saveRoom()"><div class="row"><button class="blue" onclick="connectRoom()">Collega</button><span id="conn" class="small">Non collegato</span></div></div>
  <div class="grid"><div class="card"><b>Giocatori</b><label>Nome giocatore</label><input id="playerName" placeholder="Es. Marco Rossi"><div class="row"><button onclick="addPlayer()">Aggiungi</button><button class="secondary" onclick="clearPlayers()">Svuota lista</button></div><div id="playersList" class="small"></div></div><div class="card"><b>Impostazioni display</b><label>Numero pedane visibili</label><select id="boardCount" onchange="setBoardCount()"><option>2</option><option>3</option><option>4</option><option>5</option><option selected>6</option></select><label>Durata schermata chiamata</label><select id="callSeconds" onchange="setCallSeconds()"><option value="10">10 secondi</option><option value="15" selected>15 secondi</option><option value="20">20 secondi</option><option value="30">30 secondi</option></select><div class="small">Sul tablet premi “Tablet/TV”.</div></div></div>
  <div class="card"><b>Gestione pedane</b><div id="boardsAdmin" class="boardsAdmin"></div></div><div class="card"><button class="danger" onclick="resetAll()">Reset completo torneo</button></div>
</main>
<section id="display" class="hidden"><div class="displayHeader"><div class="displayLogo">🎯 Dart <span>Master</span> Call</div><div class="stats" id="displayStats"></div></div><div class="boardGrid" id="boardGrid"></div><div id="callOverlay" class="overlay hidden"></div></section>
<script src="firebase-config.js"></script>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";import{getDatabase,ref,set,onValue,update}from"https://www.gstatic.com/firebasejs/10.12.4/firebase-database.js";const $=id=>document.getElementById(id);let app,db,roomRef,audioCtx,lastCallTs=0,overlayTimer;function defaultBoards(){return Array.from({length:6},(_,i)=>({id:i+1,status:"free",p1:"",p2:"",calledAt:0,playingAt:0}))}function defaultState(){return{players:[],boardCount:6,callSeconds:15,boards:defaultBoards(),lastCall:null}}let state=defaultState();$("room").value=localStorage.getItem("dmc_room")||"BARMAGIC";window.saveRoom=()=>localStorage.setItem("dmc_room",$("room").value.trim()||"BARMAGIC");window.connectRoom=()=>{try{if(!window.firebaseConfig||window.firebaseConfig.apiKey.includes("INSERISCI")){$("conn").innerHTML="⚠️ Configura prima firebase-config.js";return}app=app||initializeApp(window.firebaseConfig);db=getDatabase(app);const room=($("room").value.trim()||"BARMAGIC").replace(/[^a-zA-Z0-9_-]/g,"");roomRef=ref(db,"rooms/"+room);onValue(roomRef,snap=>{state=normalize(snap.val()||defaultState());render()});$("conn").innerHTML="✅ Collegato"}catch(e){$("conn").innerText="Errore: "+e.message}};function normalize(s){s.boards=s.boards||defaultBoards();while(s.boards.length<6)s.boards.push({id:s.boards.length+1,status:"free",p1:"",p2:"",calledAt:0,playingAt:0});s.boardCount=Number(s.boardCount||6);s.callSeconds=Number(s.callSeconds||15);s.players=s.players||[];return s}function push(partial){if(!roomRef){alert("Prima premi Collega");return}update(roomRef,partial)}function saveFull(){if(!roomRef){alert("Prima premi Collega");return}set(roomRef,state)}window.addPlayer=()=>{const name=$("playerName").value.trim();if(!name)return;push({players:[...(state.players||[]),name]});$("playerName").value=""};window.clearPlayers=()=>{if(confirm("Svuotare lista giocatori?"))push({players:[]})};window.setBoardCount=()=>push({boardCount:Number($("boardCount").value)});window.setCallSeconds=()=>push({callSeconds:Number($("callSeconds").value)});window.assignBoard=i=>{const p1=$(`p1_${i}`).value,p2=$(`p2_${i}`).value;if(!p1||!p2||p1===p2){alert("Scegli due giocatori diversi");return}state.boards[i]={...state.boards[i],p1,p2,status:"called",calledAt:Date.now()};state.lastCall={...state.boards[i],ts:Date.now()};saveFull()};window.callBoard=i=>{const b=state.boards[i];if(!b.p1||!b.p2){alert("Prima assegna due giocatori alla pedana");return}state.boards[i]={...b,status:"called",calledAt:Date.now()};state.lastCall={...state.boards[i],ts:Date.now()};saveFull()};window.recallBoard=i=>window.callBoard(i);window.playBoard=i=>{state.boards[i]={...state.boards[i],status:"playing",playingAt:Date.now()};saveFull()};window.finishBoard=i=>{state.boards[i]={id:i+1,status:"free",p1:"",p2:"",calledAt:0,playingAt:0};saveFull()};window.resetAll=()=>{if(confirm("Reset completo?"))set(roomRef,defaultState())};window.showAdmin=()=>{$("admin").classList.remove("hidden");$("display").classList.add("hidden");$("topbar").classList.remove("hidden")};window.showDisplay=()=>{$("admin").classList.add("hidden");$("display").classList.remove("hidden");$("topbar").classList.add("hidden");connectRoom();try{document.documentElement.requestFullscreen?.()}catch(e){}};function render(){$("boardCount").value=String(state.boardCount);$("callSeconds").value=String(state.callSeconds);$("playersList").innerHTML=(state.players||[]).map((p,i)=>`<div style="padding:6px 0"><b>${i+1}.</b> ${esc(p)}</div>`).join("")||"<br>Nessun giocatore inserito";renderAdminBoards();renderDisplay();maybeShowCallOverlay()}function options(selected){return`<option value="">Scegli</option>`+(state.players||[]).map(p=>`<option ${p===selected?"selected":""}>${esc(p)}</option>`).join("")}function statusPill(status){if(status==="playing")return`<span class="pill playing">🟢 IN GIOCO</span>`;if(status==="called")return`<span class="pill called">🟡 CHIAMATA</span>`;return`<span class="pill free">⚪ LIBERA</span>`}function renderAdminBoards(){$("boardsAdmin").innerHTML=state.boards.slice(0,state.boardCount).map((b,i)=>`<div class="boardAdmin"><div class="boardTitle"><span>Pedana ${b.id}</span>${statusPill(b.status)}</div><label>Giocatore 1</label><select id="p1_${i}">${options(b.p1)}</select><label>Giocatore 2</label><select id="p2_${i}">${options(b.p2)}</select><div class="row" style="margin-top:10px"><button class="blue" onclick="assignBoard(${i})">Assegna + Chiama</button><button onclick="callBoard(${i})">🔔 Chiama</button><button class="secondary" onclick="recallBoard(${i})">🔁 Richiama</button><button class="ok" onclick="playBoard(${i})">▶ In gioco</button><button class="danger" onclick="finishBoard(${i})">✅ Fine</button></div></div>`).join("")}function renderDisplay(){const boards=state.boards.slice(0,state.boardCount),playing=boards.filter(b=>b.status==="playing").length,called=boards.filter(b=>b.status==="called").length,free=boards.filter(b=>b.status==="free").length;$("displayStats").innerHTML=`🟢 ${playing} in gioco &nbsp; ⚪ ${free} libere &nbsp; 🟡 ${called} chiamate`;$("boardGrid").innerHTML=boards.map(b=>{const cls=b.status==="playing"?"playingState":b.status==="called"?"calledState":"freeState";const statusText=b.status==="playing"?"🟢 IN GIOCO":b.status==="called"?"🟡 CHIAMATA":"⚪ LIBERA";const players=b.status==="free"?"LIBERA":`${esc(b.p1)}<br><span style="font-size:.55em;color:var(--muted)">VS</span><br>${esc(b.p2)}`;return`<div class="boardTile ${cls}"><div class="tileTop"><span>PEDANA ${b.id}</span><span>${statusText}</span></div><div class="tilePlayers">${players}</div><div class="tileStatus">${b.status==="called"?"PRESENTARSI":b.status==="playing"?"PARTITA IN CORSO":"DISPONIBILE"}</div></div>`}).join("")}function maybeShowCallOverlay(){const c=state.lastCall;if(!c||!c.ts||c.ts===lastCallTs)return;lastCallTs=c.ts;showOverlay(c)}function showOverlay(c){clearTimeout(overlayTimer);$("callOverlay").classList.remove("hidden");$("callOverlay").innerHTML=`<div class="callBox"><div class="callTitle">🚨 CHIAMATA</div><div class="callPedana">PEDANA ${esc(c.id)}</div><div class="callPlayers">${esc(c.p1)}<br><span style="font-size:.45em;color:var(--muted)">VS</span><br>${esc(c.p2)}</div><div class="callPedana">PRESENTARSI IN SALA FRECCETTE</div></div>`;beep();overlayTimer=setTimeout(()=>$("callOverlay").classList.add("hidden"),(state.callSeconds||15)*1000)}function beep(){try{audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();for(let i=0;i<4;i++){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=i%2?660:880;const t=audioCtx.currentTime+i*.32;g.gain.setValueAtTime(.001,t);g.gain.exponentialRampToValueAtTime(.33,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.24);o.start(t);o.stop(t+.26)}}catch(e){}}function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}render();if(location.hash==="#display")showDisplay();
</script>
</body>
</html>
